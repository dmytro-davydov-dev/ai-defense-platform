# Local development stack — Phase 1 (docs/mvp-plan/PRD-Phase-1.md,
# REQ-1.16/1.17), extended in Phase 3 (docs/mvp-plan/PRD-Phase-3.md)
# with the kafka-init topic-creation step and the outbox-publisher
# service. `docker compose up` from this directory (or
# `docker compose -f infrastructure/compose/docker-compose.yml up` from
# repo root) boots Postgres+PostGIS, Redpanda (Kafka API, see
# docs/adr/ADR-003-kafka-distribution-local-compose.md), MinIO, and all
# four app shells with no manual steps.
#
# All configuration is sourced from .env (see .env.example at the repo
# root) — no secrets are hardcoded here, per REQ-1.18.

name: ai-defense-platform

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aidefense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-aidefense}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aidefense} -d ${POSTGRES_DB:-aidefense}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [ai-defense]

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
    ports:
      - "${REDPANDA_KAFKA_PORT:-19092}:19092"
      - "${REDPANDA_ADMIN_PORT:-9644}:9644"
      - "${REDPANDA_PANDAPROXY_PORT:-18082}:18082"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks: [ai-defense]

  # PRD-Phase-3 REQ-3.1/3.2: one-shot topic creation, scripted/declarative
  # (infrastructure/kafka/create-topics.sh) so the full topology exists
  # before api/vision-service/outbox-publisher start — no manual `rpk
  # topic create` step, consistent with REQ-1.17.
  kafka-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    restart: "no"
    entrypoint: ["/bin/sh", "/kafka/create-topics.sh"]
    environment:
      REDPANDA_BROKERS: redpanda:9092
    volumes:
      - ../kafka/create-topics.sh:/kafka/create-topics.sh:ro
    depends_on:
      redpanda:
        condition: service_healthy
    networks: [ai-defense]

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [ai-defense]

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8080
    ports:
      - "${WEB_PORT:-5173}:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ai-defense]

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-aidefense}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aidefense}
      KAFKA_BROKERS: redpanda:9092
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_MISSIONS_BUCKET: ${MINIO_MISSIONS_BUCKET:-mission-videos}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ai-defense]

  # PRD-Phase-3 REQ-3.7: Transactional Outbox publisher. No HTTP
  # server/port/healthcheck — it's a poll loop, not a request-serving
  # app (see apps/outbox-publisher/Dockerfile's comment).
  outbox-publisher:
    build:
      context: ../..
      dockerfile: apps/outbox-publisher/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aidefense}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aidefense}
      KAFKA_BROKERS: redpanda:9092
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-20}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks: [ai-defense]

  vision-service:
    build:
      context: ../../apps/vision-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VISION_SERVICE_PORT: 8000
      KAFKA_BROKERS: redpanda:9092
      # REQ-3.8: scoped Postgres access for the processed_events
      # idempotency table only — see docs/python/Vision_Service_Shell.md.
      # No other table is ever queried from this service.
      DATABASE_URL: postgresql://${POSTGRES_USER:-aidefense}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aidefense}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # REQ-4.10: same bucket apps/api uploads mission videos to.
      MINIO_MISSIONS_BUCKET: ${MINIO_MISSIONS_BUCKET:-mission-videos}
    ports:
      - "${VISION_SERVICE_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ai-defense]

networks:
  ai-defense:
    name: ai-defense-platform

volumes:
  postgres_data:
  redpanda_data:
  minio_data:
